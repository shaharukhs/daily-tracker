# Render Blueprint for the Daily Tracker API (NestJS).
# Web app is deployed separately on Vercel; database on Neon.
# In the Render dashboard set the `sync: false` secrets (DATABASE_URL, JWT_*, CORS_ORIGIN).
services:
  - type: web
    name: daily-tracker-api
    runtime: node
    region: oregon
    plan: free
    # Build the shared package, generate the Prisma client, build the API,
    # then apply migrations against the (Neon) database.
    buildCommand: >
      corepack enable &&
      pnpm install --frozen-lockfile &&
      pnpm --filter @daily-tracker/shared build &&
      pnpm --filter @daily-tracker/api exec prisma generate &&
      pnpm --filter @daily-tracker/api build &&
      pnpm --filter @daily-tracker/api exec prisma migrate deploy
    # nest build emits to apps/api/dist/src/main.js (tsconfig rootDir is "./").
    startCommand: node apps/api/dist/src/main.js
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      # PORT is injected by Render automatically and read by config/env.ts.
      - key: DATABASE_URL
        sync: false # Neon connection string (?sslmode=require)
      - key: JWT_ACCESS_SECRET
        sync: false # openssl rand -base64 48
      - key: JWT_REFRESH_SECRET
        sync: false # openssl rand -base64 48
      - key: CORS_ORIGIN
        sync: false # the Vercel web URL, e.g. https://daily-tracker.vercel.app
